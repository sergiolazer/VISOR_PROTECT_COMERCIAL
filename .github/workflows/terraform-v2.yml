# Workflow terraform-v2 — MANUAL hasta cutover de producción.
# Activar cuando existan: bucket S3 state + DynamoDB lock (módulo bootstrap).
#
# GitHub Variables requeridas:
#   TF_STATE_BUCKET          = visor-protect-terraform-state-634756923073
#   TF_STATE_LOCK_TABLE      = visor-protect-terraform-locks
#   GITHUB_ORG, CORS_ORIGIN, ENABLE_ECS=true
#
# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

name: Terraform v2 (migrate)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Ejecutar apply tras plan (true/false)'
        required: false
        default: 'false'
      skip_import:
        description: 'Omitir import-v2.sh (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: terraform-v2-migrate
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  TF_ROOT: infrastructure/terraform-v2
  TF_DIR: infrastructure/terraform-v2/environments/production

jobs:
  terraform-v2:
    name: Terraform v2
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
      TF_VAR_github_org: ${{ vars.TF_GITHUB_ORG || github.repository_owner }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO || github.event.repository.name }}
      TF_VAR_cors_origin: ${{ vars.CORS_ORIGIN }}
      TF_VAR_enable_ecs: ${{ vars.ENABLE_ECS || 'true' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'sa-east-1' }}
      TF_APPLY: ${{ github.event.inputs.apply }}
      SKIP_IMPORT_V2: ${{ github.event.inputs.skip_import }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config
        run: |
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "::error::Configura GitHub Variable TF_STATE_BUCKET (bootstrap S3)"
            exit 1
          fi
          if [ -z "${{ vars.CORS_ORIGIN }}" ]; then
            echo "::error::Configura GitHub Variable CORS_ORIGIN"
            exit 1
          fi

      - name: Write backend.hcl
        run: |
          cat > "${{ env.TF_ROOT }}/backend.hcl" <<EOF
          bucket         = "${{ vars.TF_STATE_BUCKET }}"
          key            = "production/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ vars.TF_STATE_LOCK_TABLE || 'visor-protect-terraform-locks' }}"
          EOF

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform fmt & validate
        run: |
          terraform -chdir=${{ env.TF_ROOT }} fmt -recursive
          terraform -chdir=${{ env.TF_DIR }} init -backend=false
          terraform -chdir=${{ env.TF_DIR }} validate

      - name: Pre-apply v2 (import + plan + optional apply)
        run: |
          export TF_BACKEND_CONFIG="${{ env.TF_ROOT }}/backend.hcl"
          export TF_VAR_FILE="${{ env.TF_ROOT }}/terraform.tfvars.example"
          bash ${{ env.TF_ROOT }}/scripts/pre-apply-v2.sh

      - name: Export outputs
        if: success()
        run: |
          terraform -chdir=${{ env.TF_DIR }} output -json 2>/dev/null | jq . || true
