name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  TF_WORKING_DIR: infrastructure/terraform

# Secrets:  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Variables: TF_GITHUB_ORG (opcional), CORS_ORIGIN, ENABLE_ECS, GITHUB_REPO, ECR_IMAGE_TAG

jobs:
  quality-gate:
    name: Tests (quality gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & integration tests
        run: npm run test:ci

  terraform:
    name: Terraform (IaC)
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 60
    outputs:
      ecr_repository_url: ${{ steps.tf_outputs.outputs.ecr_repository_url }}
      backend_service_url: ${{ steps.tf_outputs.outputs.backend_service_url }}
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf_outputs.outputs.ecs_service_name }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO || github.event.repository.name }}
      TF_VAR_enable_ecs: ${{ vars.ENABLE_ECS || vars.ENABLE_APP_RUNNER || 'false' }}
      TF_VAR_enable_app_runner: ${{ vars.ENABLE_APP_RUNNER || 'false' }}
      TF_VAR_ecr_image_tag: ${{ vars.ECR_IMAGE_TAG || 'latest' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'sa-east-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Terraform variables
        run: |
          ORG="${{ vars.TF_GITHUB_ORG }}"
          CORS="${{ vars.CORS_ORIGIN }}"
          ENABLE_ECS="${{ vars.ENABLE_ECS || vars.ENABLE_APP_RUNNER || 'false' }}"
          AWS_REG="${{ vars.AWS_REGION || 'sa-east-1' }}"

          if [ -z "$ORG" ]; then
            ORG="${{ github.repository_owner }}"
            echo "TF_GITHUB_ORG no configurado — usando repository_owner: $ORG"
          fi

          if [ -z "$CORS" ]; then
            CORS="http://localhost:5173"
            echo "::warning::CORS_ORIGIN no configurado — usando placeholder temporal: $CORS"
            echo "::warning::Define CORS_ORIGIN (URL del frontend) antes de tráfico real o ENABLE_ECS=true"
          fi

          if [ "$ENABLE_ECS" = "true" ] && [ "$CORS" = "http://localhost:5173" ] && [ -z "${{ vars.CORS_ORIGIN }}" ]; then
            echo "::error::CORS_ORIGIN es obligatorio cuando ENABLE_ECS=true"
            echo "::error::Configura GitHub Variable CORS_ORIGIN con la URL del frontend (ej. https://app.tudominio.com.br)"
            exit 1
          fi

          echo "TF_VAR_github_org=$ORG" >> "$GITHUB_ENV"
          echo "TF_VAR_cors_origin=$CORS" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=$AWS_REG" >> "$GITHUB_ENV"
          echo "Terraform region=$AWS_REG github_org=$ORG cors_origin=$CORS enable_ecs=$ENABLE_ECS"

      - name: Download Terraform state
        id: tf_state_download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: infrastructure/terraform

      - name: Note missing state artifact
        if: steps.tf_state_download.outcome == 'failure'
        run: |
          echo "::warning::Artifact terraform-state no encontrado (primer run, expirado >90d, o job anterior cancelado)."
          echo "::warning::bootstrap-import adoptará recursos existentes en AWS; puede tardar más en el primer sync."

      - name: Verify Terraform state restored
        run: |
          STATE="${{ env.TF_WORKING_DIR }}/terraform.tfstate"
          if [ -f "$STATE" ]; then
            SERIAL=$(jq -r '.serial // "?"' "$STATE")
            COUNT=$(jq '[.resources[]] | length' "$STATE")
            REGION=$(jq -r '.resources[0].instances[0].attributes.region // empty' "$STATE" | head -1)
            echo "::notice::State restaurado desde artifact (serial=$SERIAL, resources=$COUNT, sample_region=${REGION:-n/a})"
            jq -r '[.resources[].type] | unique | .[]' "$STATE" | sort | tr '\n' ' '
            echo ""
          else
            echo "::warning::Sin artifact terraform-state — primer run o artifact expirado (>90d). State vacío; bootstrap-import adoptará recursos existentes."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -recursive

      - name: Terraform Format Check
        run: |
          # fmt -check exit 3 = archivos sin formatear (p. ej. CRLF en Windows)
          if ! terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive; then
            echo "::error::Terraform fmt -check falló. Ejecuta: terraform -chdir=infrastructure/terraform fmt -recursive"
            exit 1
          fi

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      # bootstrap + reconcile + plan + apply viven en pre-apply.sh (evita duplicar 3× plan/bootstrap).
      - name: Terraform Apply (pre-apply atómico)
        if: github.ref == 'refs/heads/main'
        run: bash infrastructure/terraform/scripts/pre-apply.sh

      - name: Persist Terraform state
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            infrastructure/terraform/terraform.tfstate
            infrastructure/terraform/terraform.tfstate.backup
          retention-days: 90
          if-no-files-found: ignore

      - name: Verify Terraform state persisted
        if: github.ref == 'refs/heads/main' && success()
        run: |
          STATE="${{ env.TF_WORKING_DIR }}/terraform.tfstate"
          if [ ! -f "$STATE" ]; then
            echo "::error::terraform.tfstate no encontrado tras apply — el artifact no se persistirá correctamente"
            exit 1
          fi
          SERIAL=$(jq -r '.serial' "$STATE")
          COUNT=$(jq '[.resources[]] | length' "$STATE")
          echo "::notice::State persistido (serial=$SERIAL, resource_instances=$COUNT)"
          echo "Tipos de recurso en state:"
          jq -r '[.resources[].type] | unique | .[]' "$STATE" | sort

      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          ECR_URL=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw ecr_repository_url)
          echo "ecr_repository_url=$ECR_URL" >> "$GITHUB_OUTPUT"

          BACKEND_URL=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw backend_service_url 2>/dev/null || true)
          if [ "$BACKEND_URL" = "null" ] || [ -z "$BACKEND_URL" ]; then
            BACKEND_URL=""
          fi
          echo "backend_service_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

          ECS_CLUSTER=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw ecs_cluster_name 2>/dev/null || true)
          if [ "$ECS_CLUSTER" = "null" ] || [ -z "$ECS_CLUSTER" ]; then
            ECS_CLUSTER=""
          fi
          echo "ecs_cluster_name=$ECS_CLUSTER" >> "$GITHUB_OUTPUT"

          ECS_SERVICE=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw ecs_service_name 2>/dev/null || true)
          if [ "$ECS_SERVICE" = "null" ] || [ -z "$ECS_SERVICE" ]; then
            ECS_SERVICE=""
          fi
          echo "ecs_service_name=$ECS_SERVICE" >> "$GITHUB_OUTPUT"

      - name: Frontend (Vercel) — variables a actualizar
        if: success() && steps.tf_outputs.outputs.backend_service_url != ''
        run: |
          BACKEND="${{ steps.tf_outputs.outputs.backend_service_url }}"
          CORS="${{ vars.CORS_ORIGIN }}"
          {
            echo "## Frontend — actualizar Vercel"
            echo ""
            echo "Tras recrear el ALB, copia estas variables en **Vercel → Project → Settings → Environment Variables** (entorno **Production**), luego **Deployments → Redeploy**."
            echo ""
            echo "| Variable | Valor |"
            echo "|----------|-------|"
            echo "| \`VITE_API_URL\` | \`${BACKEND}\` |"
            echo "| \`VITE_SOCKET_URL\` | \`${BACKEND}\` |"
            echo ""
            echo "GitHub Variable \`CORS_ORIGIN\` (backend): \`${CORS:-https://visor-protect-comercial-frontend.vercel.app}\`"
            echo ""
            echo "Probar backend: \`${BACKEND}/health\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Vercel — VITE_API_URL y VITE_SOCKET_URL = ${BACKEND}"

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/pre-apply.plan
          retention-days: 14
          if-no-files-found: ignore

  deploy-app:
    name: Build → ECR → ECS
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && needs.terraform.result == 'success'
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
      ECS_CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
      ECS_SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_REPOSITORY_URL" ]; then
            echo "::error::ECR repository URL vacío — revisa outputs de Terraform"
            exit 1
          fi

          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" .
          docker tag "$ECR_REPOSITORY_URL:$IMAGE_TAG" "$ECR_REPOSITORY_URL:latest"
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY_URL:latest"
          echo "Imagen publicada: $ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Trigger ECS rolling deployment
        if: env.ECS_CLUSTER_NAME != '' && env.ECS_SERVICE_NAME != ''
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --force-new-deployment \
            --no-cli-pager
          echo "ECS deployment iniciado: $ECS_CLUSTER_NAME / $ECS_SERVICE_NAME"

      - name: ECS skip notice
        if: env.ECS_CLUSTER_NAME == '' || env.ECS_SERVICE_NAME == ''
        run: |
          echo "::notice::ECS no desplegado (ENABLE_ECS=false o primer bootstrap)."
          echo "Tras la primera imagen en ECR, configura ENABLE_ECS=true y vuelve a ejecutar el workflow."
