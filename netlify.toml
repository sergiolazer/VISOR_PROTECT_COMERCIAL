# Alternativa a Vercel — importar repo en https://app.netlify.com

[build]
  command = "npm ci && npm run build -w @visor-protect/shared && npm run build -w @visor-protect/frontend"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
